application:
  name: papermark
  pods:
  - name: app
    image: mfts/papermark:latest
    path: /
    servicePorts:
    - 3000
    vars:
      DATABASE_URL: "postgresql://papermark:papermark@postgres.pod:5432/papermark"
      NEXTAUTH_SECRET: "a1b2c3d4e5f6"
      NEXTAUTH_URL: "https://relaxed-weasel-papermark.cloud.nexlayer.ai"
  - name: postgres
    image: postgres:16-alpine
    servicePorts:
    - 5432
    vars:
      POSTGRES_DB: papermark
      POSTGRES_USER: papermark
      POSTGRES_PASSWORD: papermark
    volumes:
    - name: papermark-db
      mountPath: /var/lib/postgresql/data
      size: 10Gi
